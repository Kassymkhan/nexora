<script>
// ─── ОБЩИЕ ПРИЛОЖЕНИЯ ───
const { createClient } = supabase;
const SUPABASE_URL = 'https://tzvmmjwcmvazqqpichri.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6dm1tandjbXZhenFxcGljaHJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3NTk0OTAsImV4cCI6MjA4NzMzNTQ5MH0.9BX0e2HU8kvi08RLafTAhqrDbP6nm9leEk-CGmvz_9c';
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ─── СОСТОЯНИЕ ───
const STATE = {
  ciCount: 0,
  denyCount: 0,
  modalCallback: null,
  sortCol: null,
  sortDir: 'asc',
  selectedRows: new Set(),
  currentUser: null,
  currentProfile: null,
  currentEventId: null,
};

// ─── ВХОД ───
async function doLogin() {
  const email = document.getElementById('auth-email').value.trim();
  const passwordEl = document.getElementById('auth-password');
  const password = passwordEl ? passwordEl.value.trim() : '';

  if (!email) { toast('Введите email', 'error'); return; }

  const btn = document.querySelector('#screen-auth .btn-primary');
  if (btn) { btn.disabled = true; btn.textContent = 'Входим...'; }

  try {
    let { data, error } = await db.auth.signInWithPassword({ email, password });
    if (error && error.message.includes('Invalid login credentials')) {
      toast('Неверный email или пароль', 'error');
      return;
    }
    if (error) throw error;
    if (data.user) {
      STATE.currentUser = data.user;
      await new Promise(r => setTimeout(r, 600));
      const profile = await loadMyProfile();
      STATE.currentProfile = profile;
      navigateByRole(profile?.role || 'participant');
      toast('Вход выполнен', 'success');
    }
  } catch (err) {
    toast(err.message || 'Ошибка входа', 'error');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Войти'; }
  }
}

// ─── ПРОДОЛЖЕНИЕ КОДА ───
// Остальные функции без изменений (loadMyProfile, fillProfileForm, saveProfile, loadParticipantData, navigateByRole и др.)

</script>
